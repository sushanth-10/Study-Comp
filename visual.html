<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Scholarly - Mind Map</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Literata:wght@400;600;700&family=Lexend:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false, theme: 'base', themeVariables: { primaryColor: '#d7e2ff', primaryTextColor: '#041632', primaryBorderColor: '#041632', lineColor: '#4f5e7e', secondaryColor: '#c6e8cd', tertiaryColor: '#ffdad6' } });
        window.mermaid = mermaid;
    </script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#041632",
                        "secondary": "#476550",
                        "on-surface": "#191c1e",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eceef0",
                        "outline-variant": "#c5c6ce"
                    },
                    fontFamily: {
                        "headline-sm": ["Literata"],
                        "body-md": ["Lexend"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #f7f9fb;
            color: #191c1e;
        }
    </style>
</head>

<body class="app-layout flex flex-col min-h-screen font-body-md text-body-md">
    <header
        class="px-8 py-4 bg-surface-container-lowest border-b border-outline-variant flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="/dashboard"
                class="material-symbols-outlined text-on-surface hover:text-primary transition-colors cursor-pointer text-[24px] no-underline">arrow_back</a>
            <h1 class="text-headline-sm font-headline-sm font-bold text-primary">Topic Mind Map</h1>
        </div>
    </header>

    <main class="flex-grow p-6 md:p-8 flex flex-col items-center justify-center">
        <div
            class="w-full max-w-7xl bg-surface-container-lowest border border-outline-variant rounded-2xl shadow-lg p-6 md:p-10 relative min-h-[720px] flex flex-col">
            <div id="loading"
                class="absolute inset-0 flex flex-col items-center justify-center bg-surface-container-lowest/90 z-10 rounded-xl">
                <span class="material-symbols-outlined animate-spin text-[48px] text-primary mb-4">sync</span>
                <p class="text-body-md text-on-surface-variant font-medium">Generating structured study map...</p>
            </div>
            <div class="mb-6 border-b border-outline-variant pb-4">
                <h2 id="topic-title" class="text-2xl font-headline-sm text-primary font-bold">Topic</h2>
                <p class="text-on-surface-variant mt-2 text-sm md:text-base">A structured roadmap built from the topic
                    and AI-backed guidance.</p>
            </div>
            <div id="mindmap-container" class="flex-grow w-full flex items-stretch justify-center overflow-auto">
                <pre id="mermaid-code" class="mermaid hidden"></pre>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const topic = urlParams.get('topic') || 'General Study Strategy';
            document.getElementById('topic-title').textContent = topic;

            const safeTopic = topic.replace(/[()]/g, '');
            let mermaidCode = '';

            try {
                const response = await fetch('/api/concept-map/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: safeTopic, notes: '' })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data && data.nodes && data.nodes.length > 0) {
                        mermaidCode = 'graph TD;\n';
                        data.nodes.forEach(n => {
                            const shape = n.type === 'core' ? `(${n.label})` : `["${n.label}"]`;
                            mermaidCode += `  ${n.id}${shape}\n`;
                        });
                        data.edges.forEach(e => {
                            const label = e.label ? `|${e.label}|` : '';
                            mermaidCode += `  ${e.source} -->${label} ${e.target}\n`;
                        });
                    }
                }
            } catch (err) {
                console.error("Failed to fetch concept map", err);
            }

            if (!mermaidCode) {
                mermaidCode = `
mindmap
  root((` + safeTopic + `))
    Core Concepts
      Definitions & Terminology
      Fundamental Principles
      Historical Context
    Study Techniques
      Feynman Technique
      Active Recall
      Spaced Repetition
    Resources
      Textbooks
      Online Courses
      Research Papers
    Application
      Practice Problems
      Real-world Examples
      Mock Tests
                `;
            }

            const mermaidEl = document.getElementById('mermaid-code');
            mermaidEl.textContent = mermaidCode;
            mermaidEl.classList.remove('hidden');

            setTimeout(async () => {
                document.getElementById('loading').classList.add('hidden');
                try {
                    await window.mermaid.run({
                        nodes: [mermaidEl]
                    });
                    const svg = mermaidEl.querySelector('svg');
                    if (svg) {
                        svg.style.maxWidth = '100%';
                        svg.style.height = 'auto';
                        svg.style.minHeight = '640px';
                        svgPanZoom(svg, {
                            zoomEnabled: true,
                            controlIconsEnabled: true,
                            fit: true,
                            center: true,
                            minZoom: 0.1,
                            maxZoom: 10
                        });
                    }
                } catch (e) {
                    console.error('Mermaid render error:', e);
                }
            }, 100);
        });
    </script>
</body>

</html>
