<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Scholarly - Interactive Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
            --line: #334155;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Lexend', sans-serif;
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #roadmap-canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(var(--line) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #roadmap-canvas:active { cursor: grabbing; }

        #roadmap-content {
            transform-origin: center;
            will-change: transform;
            transition: transform 0.1s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tree Structure */
        .tree-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .node-box {
            background: var(--surface);
            border: 1px solid var(--line);
            padding: 16px 24px;
            border-radius: 12px;
            min-width: 180px;
            text-align: center;
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .node-box:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        .node-label { font-weight: 600; font-size: 0.95rem; }
        
        .children-container {
            display: flex;
            gap: 40px;
            margin-top: 40px;
            position: relative;
        }

        /* Connecting Lines */
        .children-container::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: var(--line);
            transform: translateX(-50%);
        }

        .node-box::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: var(--line);
            transform: translateX(-50%);
            display: none;
        }

        .has-children > .node-box::after { display: block; }

        .child-node::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            width: calc(100% + 40px);
            height: 2px;
            background: var(--line);
            transform: translateX(-50%);
            z-index: 0;
        }

        .child-node:first-child::before { width: 50%; left: 50%; }
        .child-node:last-child::before { width: 50%; left: 0; transform: none; }
        .child-node:only-child::before { display: none; }

        .node-description {
            margin-top: 8px;
            color: #94a3b8;
            font-size: 0.72rem;
            line-height: 1.45;
            max-width: 210px;
        }

        .node-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.14);
            color: #93c5fd;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .node-box.root {
            min-width: 260px;
            border-color: rgba(59, 130, 246, 0.65);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.28), rgba(30, 41, 59, 0.98));
        }

        .node-box.level2 { border-color: rgba(34, 197, 94, 0.45); }
        .node-box.level3 { border-color: rgba(245, 158, 11, 0.45); }
        .node-box.level4 { border-color: rgba(168, 85, 247, 0.45); }
        .node-box.level5 { border-color: rgba(244, 63, 94, 0.45); }

        @media (max-width: 900px) {
            #roadmap-content {
                align-items: flex-start;
                min-width: max-content;
                padding: 120px 32px 80px;
            }

            .children-container {
                gap: 22px;
            }

            .node-box {
                min-width: 150px;
                padding: 14px 16px;
            }
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }

        .control-btn:hover { background: var(--line); transform: scale(1.05); }

        header {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid var(--line);
        }

        .hidden,
        .hidden-node { display: none !important; }
        .collapsed .children-container { display: none !important; }
        .collapsed .node-box::after { background: var(--primary); height: 10px; width: 10px; border-radius: 50%; bottom: -15px; }

        #loading {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #loading.is-hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="w-12 h-12 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-400 font-medium">Building your roadmap...</p>
    </div>

    <header>
        <a href="/dashboard" class="material-symbols-outlined text-slate-400 hover:text-white no-underline">arrow_back</a>
        <div>
            <h1 id="topic-title" class="text-lg font-bold">Roadmap</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Interactive Path</p>
        </div>
        <div class="w-8 h-8 rounded-full border border-slate-700 cursor-pointer overflow-hidden ml-2" data-profile="avatar" data-action="open-profile"></div>
    </header>

    <div id="roadmap-canvas">
        <div id="roadmap-content"></div>
    </div>

    <div class="controls">
        <button class="control-btn" id="zoom-in"><span class="material-symbols-outlined">add</span></button>
        <button class="control-btn" id="zoom-out"><span class="material-symbols-outlined">remove</span></button>
        <button class="control-btn" id="reset-view"><span class="material-symbols-outlined">restart_alt</span></button>
    </div>

    <script src="/js/profile.js"></script>
    <script src="/js/profile_modal.js"></script>
    <script>
        const state = {
            scale: 1,
            x: 0,
            y: 0,
            isDragging: false,
            startX: 0,
            startY: 0
        };

        const canvas = document.getElementById('roadmap-canvas');
        const content = document.getElementById('roadmap-content');

        function updateTransform() {
            content.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
        }

        // Panning
        canvas.onmousedown = (e) => {
            if (e.target.closest('.node-box')) return;
            state.isDragging = true;
            state.startX = e.clientX - state.x;
            state.startY = e.clientY - state.y;
        };

        window.onmousemove = (e) => {
            if (!state.isDragging) return;
            state.x = e.clientX - state.startX;
            state.y = e.clientY - state.startY;
            updateTransform();
        };

        window.onmouseup = () => state.isDragging = false;

        // Zooming
        canvas.onwheel = (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            state.scale = Math.min(Math.max(state.scale * delta, 0.3), 3);
            updateTransform();
        };

        document.getElementById('zoom-in').onclick = () => { state.scale = Math.min(state.scale * 1.2, 3); updateTransform(); };
        document.getElementById('zoom-out').onclick = () => { state.scale = Math.max(state.scale / 1.2, 0.3); updateTransform(); };
        document.getElementById('reset-view').onclick = () => { state.scale = 1; state.x = 0; state.y = 0; updateTransform(); };

        // Data Rendering
        async function loadRoadmap() {
            const urlParams = new URLSearchParams(window.location.search);
            const topic = cleanTopic(urlParams.get('topic') || 'Study Topic');
            document.getElementById('topic-title').textContent = topic;
            content.innerHTML = '';
            renderTree(createFallbackRoadmap(topic), content);
            hideLoading();

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);
                const response = await fetch('/api/concept-map/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, notes: '' }),
                    signal: controller.signal
                });
                clearTimeout(timeout);

                if (response.ok) {
                    const data = await response.json();
                    content.innerHTML = '';
                    renderTree(normalizeRoadmap(data, topic), content);
                }
            } catch (err) {
                console.error(err);
            } finally {
                hideLoading();
            }
        }

        function hideLoading() {
            const loading = document.getElementById('loading');
            if (!loading) return;
            loading.classList.add('hidden', 'is-hidden');
            loading.style.display = 'none';
        }

        function cleanTopic(value) {
            return String(value || 'Study Topic')
                .replace(/[<>]/g, '')
                .replace(/\s+/g, ' ')
                .trim()
                .slice(0, 80) || 'Study Topic';
        }

        function normalizeRoadmap(data, topic) {
            if (data && data.label) {
                return normalizeTreeNode(data, topic, 1);
            }
            if (data && Array.isArray(data.nodes) && data.nodes.length) {
                return graphToTree(data, topic);
            }
            return createFallbackRoadmap(topic);
        }

        function normalizeTreeNode(node, topic, depth) {
            const children = Array.isArray(node.children) ? node.children : [];
            return {
                label: cleanTopic(node.label || (depth === 1 ? topic : 'Study Step')),
                type: node.type || `level${Math.min(depth, 5)}`,
                description: String(node.description || descriptionFor(node.label || topic, depth)).slice(0, 130),
                children: children.slice(0, 5).map(child => normalizeTreeNode(child, topic, depth + 1))
            };
        }

        function graphToTree(data, topic) {
            const sourceNodes = data.nodes.map((node, index) => ({
                label: cleanTopic(node.label || `Step ${index + 1}`),
                type: node.type || `level${Math.min(index + 1, 5)}`,
                description: String(node.description || descriptionFor(node.label || topic, index + 1)).slice(0, 130),
                children: []
            }));
            const grouped = {
                level2: [],
                level3: [],
                level4: [],
                level5: []
            };
            sourceNodes.forEach((node, index) => {
                const level = node.type && grouped[node.type] ? node.type : `level${Math.min(Math.floor(index / 3) + 2, 5)}`;
                if (grouped[level]) grouped[level].push(node);
            });
            return {
                label: topic,
                type: 'level1',
                description: `Start here, then move through the main ideas, applications, and practice for ${topic}.`,
                children: [
                    branch('Fundamentals', grouped.level2, topic, 2),
                    branch('Core Concepts', grouped.level3, topic, 3),
                    branch('Advanced Links', grouped.level4, topic, 4),
                    branch('Practice Plan', grouped.level5, topic, 5)
                ].filter(node => node.children.length)
            };
        }

        function branch(label, children, topic, depth) {
            return {
                label,
                type: `level${depth}`,
                description: descriptionFor(label, depth, topic),
                children: children.slice(0, 4)
            };
        }

        function createFallbackRoadmap(topic) {
            return {
                label: topic,
                type: 'level1',
                description: `A focused learning path for ${topic}.`,
                children: [
                    {
                        label: 'Fundamentals',
                        type: 'level2',
                        description: `Understand the basic meaning and purpose of ${topic}.`,
                        children: [
                            leaf(`${topic} Basics`, 3),
                            leaf('Key Terms', 3),
                            leaf('Quick Summary', 3)
                        ]
                    },
                    {
                        label: 'Core Ideas',
                        type: 'level2',
                        description: 'Break the topic into its most important concepts.',
                        children: [
                            leaf('Main Principles', 3),
                            leaf('How It Works', 3),
                            leaf('Important Examples', 3)
                        ]
                    },
                    {
                        label: 'Applications',
                        type: 'level2',
                        description: 'Connect the concept to questions, problems, and real use.',
                        children: [
                            leaf('Solved Problems', 3),
                            leaf('Use Cases', 3),
                            leaf('Common Mistakes', 3)
                        ]
                    },
                    {
                        label: 'Practice',
                        type: 'level2',
                        description: 'Test recall and improve weak areas.',
                        children: [
                            leaf('Easy Questions', 3),
                            leaf('Mixed Review', 3),
                            leaf('Timed Test', 3)
                        ]
                    },
                    {
                        label: 'Revision',
                        type: 'level2',
                        description: 'Revisit the topic until it becomes exam ready.',
                        children: [
                            leaf('Flashcards', 3),
                            leaf('One Page Notes', 3),
                            leaf('Final Checklist', 3)
                        ]
                    }
                ]
            };
        }

        function leaf(label, depth) {
            return {
                label,
                type: `level${Math.min(depth, 5)}`,
                description: descriptionFor(label, depth),
                children: []
            };
        }

        function descriptionFor(label, depth, topic) {
            const text = cleanTopic(label || topic || 'this topic');
            if (depth <= 1) return `Follow this roadmap to study ${text} in a clear order.`;
            if (depth === 2) return `A major section to learn before moving deeper.`;
            if (depth === 3) return `Study this part, write short notes, then answer a few questions.`;
            if (depth === 4) return `Use this to connect ideas and handle harder questions.`;
            return `Practice, check mistakes, and revise until confident.`;
        }

        function renderTree(node, parentEl) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'tree-node' + (node.children && node.children.length ? ' has-children' : '');
            
            const box = document.createElement('div');
            const levelClass = node.type === 'level1' ? 'root' : node.type;
            box.className = `node-box ${levelClass || ''}`;
            const chip = node.type ? node.type.replace('level', 'level ') : 'step';
            box.innerHTML = `
                <div class="node-chip">${escapeHtml(chip)}</div>
                <div class="node-label">${escapeHtml(node.label)}</div>
                <div class="node-description">${escapeHtml(node.description || '')}</div>
            `;
            
            box.onclick = (e) => {
                e.stopPropagation();
                nodeDiv.classList.toggle('collapsed');
            };

            nodeDiv.appendChild(box);

            if (node.children && node.children.length) {
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'children-container';
                node.children.forEach(child => {
                    const childWrap = document.createElement('div');
                    childWrap.className = 'child-node';
                    renderTree(child, childWrap);
                    childrenContainer.appendChild(childWrap);
                });
                nodeDiv.appendChild(childrenContainer);
            }

            parentEl.appendChild(nodeDiv);
        }

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value == null ? '' : String(value);
            return div.innerHTML;
        }

        loadRoadmap();
    </script>
</body>

</html>
