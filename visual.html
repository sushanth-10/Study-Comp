<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Scholarly - Interactive Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
            --line: #334155;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Lexend', sans-serif;
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #roadmap-canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(var(--line) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #roadmap-canvas:active { cursor: grabbing; }

        #roadmap-content {
            transform-origin: center;
            will-change: transform;
            transition: transform 0.1s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tree Structure */
        .tree-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .node-box {
            background: var(--surface);
            border: 1px solid var(--line);
            padding: 16px 24px;
            border-radius: 12px;
            min-width: 180px;
            text-align: center;
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .node-box:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        .node-label { font-weight: 600; font-size: 0.95rem; }
        
        .children-container {
            display: flex;
            gap: 40px;
            margin-top: 40px;
            position: relative;
        }

        /* Connecting Lines */
        .children-container::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: var(--line);
            transform: translateX(-50%);
        }

        .node-box::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: var(--line);
            transform: translateX(-50%);
            display: none;
        }

        .has-children > .node-box::after { display: block; }

        .child-node::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            width: calc(100% + 40px);
            height: 2px;
            background: var(--line);
            transform: translateX(-50%);
            z-index: 0;
        }

        .child-node:first-child::before { width: 50%; left: 50%; }
        .child-node:last-child::before { width: 50%; left: 0; transform: none; }
        .child-node:only-child::before { display: none; }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }

        .control-btn:hover { background: var(--line); transform: scale(1.05); }

        header {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid var(--line);
        }

        .hidden-node { display: none !important; }
        .collapsed .children-container { display: none !important; }
        .collapsed .node-box::after { background: var(--primary); height: 10px; width: 10px; border-radius: 50%; bottom: -15px; }

        #loading {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="w-12 h-12 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-400 font-medium">Building your roadmap...</p>
    </div>

    <header>
        <a href="/dashboard" class="material-symbols-outlined text-slate-400 hover:text-white no-underline">arrow_back</a>
        <div>
            <h1 id="topic-title" class="text-lg font-bold">Roadmap</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Interactive Path</p>
        </div>
        <div class="w-8 h-8 rounded-full border border-slate-700 cursor-pointer overflow-hidden ml-2" data-profile="avatar" data-action="open-profile"></div>
    </header>

    <div id="roadmap-canvas">
        <div id="roadmap-content"></div>
    </div>

    <div class="controls">
        <button class="control-btn" id="zoom-in"><span class="material-symbols-outlined">add</span></button>
        <button class="control-btn" id="zoom-out"><span class="material-symbols-outlined">remove</span></button>
        <button class="control-btn" id="reset-view"><span class="material-symbols-outlined">restart_alt</span></button>
    </div>

    <script src="/js/profile.js"></script>
    <script src="/js/profile_modal.js"></script>
    <script>
        const state = {
            scale: 1,
            x: 0,
            y: 0,
            isDragging: false,
            startX: 0,
            startY: 0
        };

        const canvas = document.getElementById('roadmap-canvas');
        const content = document.getElementById('roadmap-content');

        function updateTransform() {
            content.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
        }

        // Panning
        canvas.onmousedown = (e) => {
            if (e.target.closest('.node-box')) return;
            state.isDragging = true;
            state.startX = e.clientX - state.x;
            state.startY = e.clientY - state.y;
        };

        window.onmousemove = (e) => {
            if (!state.isDragging) return;
            state.x = e.clientX - state.startX;
            state.y = e.clientY - state.startY;
            updateTransform();
        };

        window.onmouseup = () => state.isDragging = false;

        // Zooming
        canvas.onwheel = (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            state.scale = Math.min(Math.max(state.scale * delta, 0.3), 3);
            updateTransform();
        };

        document.getElementById('zoom-in').onclick = () => { state.scale = Math.min(state.scale * 1.2, 3); updateTransform(); };
        document.getElementById('zoom-out').onclick = () => { state.scale = Math.max(state.scale / 1.2, 0.3); updateTransform(); };
        document.getElementById('reset-view').onclick = () => { state.scale = 1; state.x = 0; state.y = 0; updateTransform(); };

        // Data Rendering
        async function loadRoadmap() {
            const urlParams = new URLSearchParams(window.location.search);
            const topic = urlParams.get('topic') || 'Study Topic';
            document.getElementById('topic-title').textContent = topic;

            try {
                const response = await fetch('/api/concept-map/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: topic.replace(/[()]/g, ''), notes: '' })
                });

                if (response.ok) {
                    const data = await response.json();
                    renderTree(data, content);
                } else {
                    content.innerHTML = `<p class="text-red-400">Failed to generate roadmap. Please try again.</p>`;
                }
            } catch (err) {
                console.error(err);
                content.innerHTML = `<p class="text-red-400">Connection error. Check your backend.</p>`;
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderTree(node, parentEl) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'tree-node' + (node.children && node.children.length ? ' has-children' : '');
            
            const box = document.createElement('div');
            box.className = 'node-box';
            box.innerHTML = `<div class="node-label">${node.label}</div>`;
            
            box.onclick = (e) => {
                e.stopPropagation();
                nodeDiv.classList.toggle('collapsed');
            };

            nodeDiv.appendChild(box);

            if (node.children && node.children.length) {
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'children-container';
                node.children.forEach(child => {
                    const childWrap = document.createElement('div');
                    childWrap.className = 'child-node';
                    renderTree(child, childWrap);
                    childrenContainer.appendChild(childWrap);
                });
                nodeDiv.appendChild(childrenContainer);
            }

            parentEl.appendChild(nodeDiv);
        }

        loadRoadmap();
    </script>
</body>

</html>
