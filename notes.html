<body class="app-layout bg-surface text-on-surface min-h-screen flex flex-col font-body-md" data-page="notes">
<header class="desktop-topbar">
<div class="flex justify-between items-center w-full">
<div class="flex items-center gap-unit-3">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="menu_book">menu_book</span>
<h1 class="text-headline-sm font-headline-sm font-bold text-primary dark:text-primary-fixed">Scholarly</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A close-up portrait of a thoughtful student in a modern library setting. The lighting is soft and natural, emphasizing a calm, academic atmosphere. The background shows blurred bookshelves and warm wood textures, aligning with a scholarly, high-end professional aesthetic. The subject wears minimalist attire in neutral tones like navy and cream." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdd_SsvxugYXz3xZ7o_gT6Bj7FnvGXG8H4ETZm1076SmZNETqc8EAFL3B5WMVcXdyPCjg6Ae2UdCXbx1p8XKeUmUBnWRWS5O7oDvtcedtBLpyr7uYPesnOboAYr9ixtXhKUmC6RzYY34PvXC5eg4WYPwjQOYwWNxm_MPdctyhttAqRsU14Gp-DeVrVyw-KKrJGWCQ6uft3KelYIBb5YWhb43J-4fFSdl-Awgx5MNPkW2Vg2P5lN0R7FqRlwKOKQNqDXxfgOx5VaFzD"/>
</div>
</div>
</header>
<main class="app-content-inner flex-1 py-unit-6">
<div class="mb-unit-6">
<h2 class="text-headline-md font-headline-md text-primary mb-unit-1">PDF Library</h2>
<p class="text-body-sm text-on-surface-variant"><span id="notes-count">0 PDFs</span> stored on this device</p>
</div>
<div id="notes-drop-zone" class="notes-drop-zone mb-unit-8" tabindex="0" role="button" aria-label="Upload PDF files">
<input id="notes-file-input" type="file" accept="application/pdf,.pdf" multiple class="hidden"/>
<span class="material-symbols-outlined text-[48px] text-secondary mb-unit-3">upload_file</span>
<p class="text-body-md text-on-surface font-label-md">Drop PDFs here or click to browse</p>
<p class="text-body-sm text-on-surface-variant mt-unit-1">Up to 25 MB per file</p>
<p id="notes-upload-status" class="hidden text-body-sm mt-unit-2"></p>
</div>
<div class="mb-unit-6">
<div class="relative group">
<span class="material-symbols-outlined absolute left-unit-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input id="notes-search" class="w-full bg-surface-container-low border-none rounded-xl py-unit-4 pl-unit-8 pr-unit-4 text-body-md text-on-surface focus:ring-2 focus:ring-secondary transition-all placeholder:text-outline" placeholder="Search your PDFs..." type="search"/>
</div>
</div>
<div id="notes-empty" class="hidden text-center py-unit-8 text-on-surface-variant">
<span class="material-symbols-outlined text-[56px] text-outline-variant mb-unit-3">folder_open</span>
<p class="text-body-md">No PDFs yet. Drop your lecture slides or readings above.</p>
</div>
<div id="notes-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-unit-4 pb-unit-8"></div>
</main>
<div id="notes-viewer" class="hidden fixed inset-0 z-[200] bg-black/60 flex flex-col p-unit-4 md:p-unit-8" style="left:260px">
<div class="bg-surface-container-lowest rounded-xl shadow-2xl flex flex-col flex-1 max-w-5xl w-full mx-auto overflow-hidden">
<div class="flex items-center justify-between p-unit-4 border-b border-outline-variant">
<h3 id="notes-viewer-title" class="text-headline-sm font-headline-sm text-primary truncate"></h3>
<button id="notes-viewer-close" type="button" class="p-unit-2 rounded-full hover:bg-surface-container text-on-surface-variant" aria-label="Close">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<iframe id="notes-viewer-frame" class="flex-1 w-full border-0 bg-white min-h-[60vh]" title="PDF viewer"></iframe>
</div>
</div>
<button id="notes-add-btn" type="button" class="fixed right-8 bottom-8 w-14 h-14 bg-primary text-on-primary rounded-full shadow-lg flex items-center justify-center z-40 hover:scale-105 transition-transform" aria-label="Add PDF">
<span class="material-symbols-outlined text-[32px]">add</span>
</button>
