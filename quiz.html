<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scholarly - Focus Quiz</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400..900;1,400..900&amp;family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary-container": "#4b6954",
                      "error": "#ba1a1a",
                      "on-secondary-fixed-variant": "#304d39",
                      "on-background": "#191c1e",
                      "surface-container-highest": "#e0e3e5",
                      "outline": "#75777e",
                      "outline-variant": "#c5c6ce",
                      "tertiary": "#06172a",
                      "inverse-on-surface": "#eff1f3",
                      "surface-dim": "#d8dadc",

                      "surface-container-low": "#f2f4f6",

                      "on-error": "#ffffff",
                      "tertiary-fixed-dim": "#b7c8e1",
                      "secondary": "#476550",
                      "inverse-surface": "#2d3133",
                      "on-tertiary-container": "#8393ac",
                      "surface-variant": "#e0e3e5",
                      "on-secondary-fixed": "#032110",
                      "secondary-fixed-dim": "#adcfb5",
                      "tertiary-fixed": "#d3e4fe",
                      "primary": "#041632",
                      "on-primary-fixed": "#091b37",
                      "secondary-fixed": "#c9ebd0",
                      "primary-fixed-dim": "#b7c7eb",
                      "surface-container": "#eceef0",
                      "surface-tint": "#4f5e7e",
                      "tertiary-container": "#1c2c40",

                      "surface-container-lowest": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {

                      "unit-6": "24px",

                      "unit-8": "32px",
                      "container-margin": "20px",
                      "unit-1": "4px",
                      "base": "4px",
                      "unit-4": "16px"
              },
              "fontFamily": {
                      "headline-lg-mobile": ["Literata"],
                      "body-lg": ["Lexend"],
                      "label-md": ["Lexend"],

          },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7f9fb; /* Soft slate background */
        }
    </style>
<link href="/css/desktop.css" rel="stylesheet"/>
  </head>
<body class="app-layout bg-surface text-on-surface font-body-md antialiased" data-page="quiz">
<header class="desktop-topbar">
<div class="flex justify-between items-center w-full">
<div class="flex items-center gap-unit-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="menu_book">menu_book</span>
<span class="text-headline-sm font-headline-sm font-bold text-primary dark:text-primary-fixed">Scholarly</span>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high border border-outline-variant">
<img alt="User profile avatar" data-alt="A clean, minimalist portrait illustration of a scholar in a modern digital style. The lighting is soft and even, highlighting the professional and calm demeanor. The background is a solid, muted light slate blue, aligning with the Scholarly brand identity and focus-oriented aesthetic. High-quality vector art style with subtle gradients." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPYnM8OGlvd8qhjqMSIzCxifKMAevWDQY2t95_gTEa3tb8K3lP4tJSvBxbgmcxBUdF_V3V-E9sZO_j9Q8DitsfXGF5YSNKZsWyPzCKSuST9HtXlMgplBEfysMAQ3J1_EOKVq1Zg_Vm5AGZBLAPn9GpewUnHywOOO-l997W3Rf8V-5kdptwBh75SaT_yWU7BmwNkRirIZbPEZaCIv4D0pcfUkPg4qOxQVDKlvyn6OdRl8GDd2Xyxnlw1ECw5ubsWbAfA4SeuOXI6R0s"/>
</div>
</div>
</header>
<main class="app-content-inner py-8 pb-40 max-w-3xl">
<section id="quiz-setup">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-primary mb-unit-2">Focus Quiz</h1>
<p class="text-body-md text-on-surface-variant mb-unit-8">Enter a topic, pick a difficulty, and generate 10-30 multiple-choice questions.</p>
<form id="quiz-form" class="space-y-unit-6">
<div>
<label class="text-label-md font-label-md text-on-surface-variant block mb-unit-2" for="quiz-topic">Topic or Document</label>
<div class="relative flex items-center">
    <input id="quiz-topic" type="text" required minlength="2" placeholder="e.g. Photosynthesis, World War II, Calculus" class="w-full pl-unit-4 pr-12 py-unit-3 rounded-xl border border-outline-variant bg-surface-container-lowest text-body-md focus:ring-2 focus:ring-secondary focus:border-secondary outline-none"/>
    <button type="button" id="quiz-attach-btn" class="absolute right-2 p-2 rounded-full hover:bg-surface-container text-on-surface-variant transition-colors flex items-center justify-center" title="Attach PDF or Image">
        <span class="material-symbols-outlined text-[20px]">attach_file</span>
    </button>
    <input type="file" id="quiz-file-input" accept="application/pdf, image/*" class="hidden" />
</div>
<div id="quiz-scan-status" class="hidden mt-2 text-label-sm text-secondary flex items-center gap-1">
    <span class="material-symbols-outlined text-[16px] animate-spin">refresh</span>
    <span>Scanning document...</span>
</div>
</div>
<div>
<span class="text-label-md font-label-md text-on-surface-variant block mb-unit-3">Difficulty</span>
<div class="flex flex-wrap gap-unit-3">
<label class="cursor-pointer"><input type="radio" name="difficulty" value="easy" class="peer sr-only"/><span class="inline-flex px-unit-4 py-unit-2 rounded-full border border-outline-variant bg-surface-container-lowest text-label-md peer-checked:bg-secondary-container peer-checked:border-on-secondary-container peer-checked:text-on-secondary-container transition-colors">Easy</span></label>
<label class="cursor-pointer"><input type="radio" name="difficulty" value="moderate" class="peer sr-only" checked/><span class="inline-flex px-unit-4 py-unit-2 rounded-full border border-outline-variant bg-surface-container-lowest text-label-md peer-checked:bg-secondary-container peer-checked:border-on-secondary-container peer-checked:text-on-secondary-container transition-colors">Moderate</span></label>
<label class="cursor-pointer"><input type="radio" name="difficulty" value="hard" class="peer sr-only"/><span class="inline-flex px-unit-4 py-unit-2 rounded-full border border-outline-variant bg-surface-container-lowest text-label-md peer-checked:bg-secondary-container peer-checked:border-on-secondary-container peer-checked:text-on-secondary-container transition-colors">Hard</span></label>
</div>
</div>
<div>
<label class="text-label-md font-label-md text-on-surface-variant block mb-unit-2" for="quiz-count">Number of questions</label>
<select id="quiz-count" class="w-full px-unit-4 py-unit-3 rounded-xl border border-outline-variant bg-surface-container-lowest text-body-md focus:ring-2 focus:ring-secondary outline-none">
<option value="10">10 questions</option>
<option value="15" selected>15 questions</option>
<option value="20">20 questions</option>
<option value="25">25 questions</option>
<option value="30">30 questions</option>
</select>
</div>
<p id="quiz-setup-error" class="hidden text-body-sm text-error"></p>
<button id="quiz-generate" type="submit" class="w-full py-4 rounded-full bg-primary text-on-primary font-label-md shadow-lg hover:opacity-90 transition-all active:scale-[0.98]">Generate Quiz</button>
</form>
</section>
<section id="quiz-play" class="hidden">
<section class="mb-unit-8">
<div class="flex justify-between items-end mb-unit-2">
<span id="quiz-progress-label" class="text-label-md font-label-md text-on-surface-variant">QUESTION 1 OF 15</span>
<span id="quiz-progress-pct" class="text-label-md font-label-md text-secondary">0% Complete</span>
</div>
<div class="w-full h-3 bg-surface-container rounded-full overflow-hidden">
<div id="quiz-progress-bar" class="h-full bg-secondary rounded-full transition-all duration-300" style="width:0%"></div>
</div>
</section>
<section class="mb-unit-8">
<div class="bg-surface-container-lowest p-unit-6 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-surface-container-high">
<h2 id="quiz-question" class="text-headline-lg-mobile font-headline-lg-mobile text-primary mb-unit-4"></h2>
<div class="flex items-center gap-unit-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">quiz</span>
<span id="quiz-topic-badge" class="text-label-sm font-label-sm"></span>
</div>
</div>
</section>
<section id="quiz-options" class="space-y-unit-4"></section>
<div id="quiz-feedback" class="hidden mt-unit-4 p-unit-4 rounded-xl bg-surface-container-low"></div>
</section>
<section id="quiz-results" class="hidden text-center py-unit-8">
<span class="material-symbols-outlined text-[64px] text-secondary mb-unit-4" style="font-variation-settings:'FILL' 1">emoji_events</span>
<h2 class="text-headline-md font-headline-md text-primary mb-unit-2">Quiz Complete</h2>
<p id="quiz-final-score" class="text-headline-lg font-headline-lg text-secondary mb-unit-4">0 / 0</p>
<p id="quiz-final-summary" class="text-body-md text-on-surface-variant mb-unit-8 max-w-md mx-auto"></p>
<button id="quiz-restart" type="button" class="px-unit-8 py-unit-4 rounded-full bg-primary text-on-primary font-label-md hover:opacity-90 transition-all">New Quiz</button>
</section>
</main>
<!-- Bottom Action Shell -->
<footer id="quiz-footer" class="hidden fixed bottom-0 left-[260px] right-0 bg-surface z-50 p-container-margin shadow-[0_-8px_24px_rgba(0,0,0,0.06)] border-t border-outline-variant">
<div class="max-w-3xl mx-auto">
<div class="flex gap-unit-4">
<button id="quiz-skip" type="button" class="flex-1 py-4 px-unit-6 rounded-full bg-surface-container-high text-on-surface font-label-md hover:bg-surface-container-highest transition-colors flex items-center justify-center gap-unit-2">
<span class="material-symbols-outlined text-[18px]">skip_next</span>
                Skip
            </button>
<button id="quiz-submit" type="button" class="flex-[2] py-4 px-unit-6 rounded-full bg-primary text-on-primary font-label-md hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-unit-2 shadow-lg">
                Submit Answer
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
</footer>
<script src="/js/app.js" defer></script>
<script src="/js/quiz.js" defer></script>
</body></html>
