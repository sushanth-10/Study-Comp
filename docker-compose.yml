version: '3.8'

services:
  study-comp:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env
