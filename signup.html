<body class="auth-page bg-surface text-on-surface min-h-screen">
<div class="auth-split">
<div class="auth-split-visual">
<h1 class="font-headline-lg text-headline-lg text-white mb-unit-4">Begin Your Journey</h1>
<p class="font-body-lg text-body-lg text-primary-fixed opacity-90">Create a Scholarly account to organize your studies and track your academic progress.</p>
</div>
<main class="auth-split-form">
<header class="flex items-center justify-center gap-unit-2 mb-unit-8">
<div class="flex items-center gap-unit-2">
<span class="material-symbols-outlined text-primary text-headline-sm" data-icon="menu_book">menu_book</span>
<h1 class="text-headline-sm font-headline-sm font-bold text-primary">Scholarly</h1>
</div>
</header>
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-primary mb-unit-2">Create Account</h2>
<p class="text-body-md font-body-md text-on-surface-variant mb-unit-8">Join Scholarly today.</p>
<form class="bg-surface-container-lowest rounded-xl shadow-sm p-unit-6 flex flex-col gap-unit-6 border border-surface-variant/50" id="signup-form" method="POST" action="/signup">
<!-- Full Name Input -->
<div class="flex flex-col gap-unit-2">
<label class="text-label-md font-label-md text-on-surface-variant ml-1" for="full_name">Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline-variant" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg text-body-md font-body-md focus:outline-none focus:border-secondary transition-colors placeholder:text-outline-variant" id="full_name" name="full_name" placeholder="Alexander Hamilton" type="text" required/>
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-unit-2">
<label class="text-label-md font-label-md text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline-variant" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg text-body-md font-body-md focus:outline-none focus:border-secondary transition-colors placeholder:text-outline-variant" id="email" name="email" placeholder="name@university.edu" type="email" required/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit-2">
<label class="text-label-md font-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline-variant" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface border border-outline-variant rounded-lg text-body-md font-body-md focus:outline-none focus:border-secondary transition-colors placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password" required/>
<button class="absolute right-4 text-outline-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<p class="text-label-sm font-label-sm text-outline ml-1">Must be at least 8 characters.</p>
</div>
<!-- Terms of Service -->
<div class="flex items-start gap-unit-3 px-1 mt-unit-2">
<div class="flex items-center h-5">
<input class="h-5 w-5 rounded border-outline-variant text-secondary focus:ring-secondary cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-body-sm font-body-sm text-on-surface-variant leading-tight" for="terms">
                    I agree to the <a class="text-secondary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-secondary font-medium hover:underline" href="#">Privacy Policy</a>.
                </label>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-4 rounded-full text-label-md font-label-md hover:opacity-90 transition-all flex items-center justify-center gap-unit-2 shadow-md" type="submit">
                Create Account
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<p class="mt-unit-8 text-center text-body-md text-on-surface-variant">
                Already have an account?
                <a class="text-primary font-bold hover:underline" href="/login">Log in</a>
</p>
</main>
</div>
