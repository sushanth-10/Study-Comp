version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: scholarly-db
    environment:
      POSTGRES_USER: scholarly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure-password-change-me}
      POSTGRES_DB: scholarly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U scholarly" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scholarly-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: scholarly-app
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      DATABASE_URL: postgresql://scholarly:${POSTGRES_PASSWORD:-secure-password-change-me}@db:5432/scholarly_db
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - scholarly-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  scholarly-network:
    driver: bridge
