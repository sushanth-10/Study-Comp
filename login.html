<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scholarly - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@400;600;700&amp;family=Lexend:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="/css/desktop.css" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#041632",
                        "secondary": "#476550",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#44474d",
                        "outline": "#75777e",
                        "outline-variant": "#c5c6ce",
                        "surface": "#f7f9fb",
                        "surface-container": "#eceef0",
                        "surface-container-low": "#f2f4f6",
                        "primary-fixed": "#d7e2ff"
                    },
                    "fontFamily": {
                        "headline-lg": ["Literata"],
                        "headline-lg-mobile": ["Literata"],
                        "headline-sm": ["Literata"],
                        "body-md": ["Lexend"],
                        "body-sm": ["Lexend"],
                        "label-md": ["Lexend"],
                        "label-sm": ["Lexend"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "headline-sm": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6"}],
                        "body-sm": ["14px", {"lineHeight": "1.5"}],
                        "label-md": ["14px", {"fontWeight": "600"}],
                        "label-sm": ["12px", {"fontWeight": "500"}]
                    },
                    "spacing": {
                        "unit-1": "4px", "unit-2": "8px", "unit-3": "12px",
                        "unit-4": "16px", "unit-6": "24px", "unit-8": "32px",
                        "container-margin": "20px"
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #f7f9fb; color: #191c1e; }
    </style>
</head>
<body class="auth-page min-h-screen font-body-md text-body-md">
<div class="auth-split">
  <div class="auth-split-visual">
    <img alt="Scholarly Focus" class="shadow-2xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDx55dj6fxjq5yLCZgvyEu_GsaoWXgKQm-_-ZW0axxAzjVeA_By7yEloxSBLxhuNSyoGupJ_zdIuPdB4k24gvXFzXADhNqznLYhrP3sj5X-MICAfwjJcDKms7E2LWHu4tl95aSymF_e6tFH4rRiAvHXZZwy0I6fpdK40wr1doAxHksN_uzcpC6am85RobrJ-bypmv85nJcSUKU38OAV9gwZ65UhRzHT5EHOh-xcvU4A7G1PpkihI05AAdZAjZsgJ7YV9w4bJKHFYnxP"/>
    <h1 class="font-headline-lg text-headline-lg text-white mb-unit-4">Welcome to Scholarly</h1>
    <p class="font-body-md text-body-md text-primary-fixed opacity-90">Your desktop study companion — notes, focus sessions, quizzes, and AI help in one place.</p>
  </div>
  <main class="auth-split-form">
    <div class="flex items-center gap-unit-2 mb-unit-8">
      <span class="material-symbols-outlined text-primary">menu_book</span>
      <h1 class="text-headline-sm font-headline-sm font-bold text-primary">Scholarly</h1>
    </div>
    <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Welcome Back</h2>
    <p class="font-body-md text-body-md text-on-surface-variant mt-unit-2 mb-unit-8">Continue your journey of scholarly discovery.</p>
    <form class="w-full space-y-unit-4" id="login-form" method="POST" action="/login">
      <div class="flex flex-col gap-unit-1">
        <label class="font-label-md text-label-md text-on-surface ml-unit-1" for="email">Email Address</label>
        <div class="relative flex items-center">
          <span class="material-symbols-outlined absolute left-unit-3 text-outline">mail</span>
          <input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary outline-none" id="email" name="email" placeholder="e.g. learner@scholar.edu" type="email" required/>
        </div>
      </div>
      <div class="flex flex-col gap-unit-1">
        <div class="flex justify-between items-center px-unit-1">
          <label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
        </div>
        <div class="relative flex items-center">
          <span class="material-symbols-outlined absolute left-unit-3 text-outline">lock</span>
          <input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary outline-none" id="password" name="password" placeholder="••••••••" type="password" required/>
        </div>
      </div>
      <button class="w-full bg-primary text-white font-label-md py-4 rounded-xl shadow-lg hover:opacity-90 transition-opacity mt-unit-4 flex justify-center items-center gap-unit-2" type="submit">
        Sign In
        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
      </button>
    </form>
    <p class="font-body-sm text-body-sm text-on-surface-variant text-center mt-unit-8">
      New to Scholarly?
      <a class="text-primary font-bold hover:underline" href="/signup">Create an account</a>
    </p>
  </main>
</div>
<script src="/js/app.js" defer></script>
</body></html>
