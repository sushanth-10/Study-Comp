<!-- Hero Section -->
<div class="w-full mb-unit-8 flex flex-col items-center">

<img alt="Scholarly Focus" class="w-full h-full object-cover" data-alt="A serene digital illustration of a student deeply focused on an open book, surrounded by soft, glowing particles of knowledge. The setting is a minimalist, modern library with high-key lighting and a calming Sage Green and Navy Blue color palette. The artistic style is clean and academic, emphasizing deep focus and quiet productivity with soft, ambient shadows and a minimalist background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDx55dj6fxjq5yLCZgvyEu_GsaoWXgKQm-_-ZW0axxAzjVeA_By7yEloxSBLxhuNSyoGupJ_zdIuPdB4k24gvXFzXADhNqznLYhrP3sj5X-MICAfwjJcDKms7E2LWHu4tl95aSymF_e6tFH4rRiAvHXZZwy0I6fpdK40wr1doAxHksN_uzcpC6am85RobrJ-bypmv85nJcSUKU38OAV9gwZ65UhRzHT5EHOh-xcvU4A7G1PpkihI05AAdZAjZsgJ7YV9w4bJKHFYnxP"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary text-center">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-unit-2">Continue your journey of scholarly discovery.</p>
</div>
<!-- Login Form -->
<div class="w-full space-y-unit-4">
<!-- Email Field -->
<div class="flex flex-col gap-unit-1">
<label class="font-label-md text-label-md text-on-surface ml-unit-1" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-unit-3 text-outline">mail</span>
<input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none text-on-surface placeholder:text-outline-variant" id="email" placeholder="e.g. learner@scholar.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit-1">
<div class="flex justify-between items-center px-unit-1">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-unit-3 text-outline">lock</span>
<input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary text-white font-label-md text-label-md py-4 rounded-xl shadow-lg active:scale-95 transition-transform duration-150 mt-unit-4 flex justify-center items-center gap-unit-2">
                Sign In
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
<!-- Social Login Separator -->
<div class="w-full flex items-center gap-unit-4 my-unit-8">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline-variant">OR CONTINUE WITH</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<!-- Social Buttons -->
<div class="w-full grid grid-cols-2 gap-unit-4 mb-unit-8">
<button class="flex items-center justify-center gap-unit-2 py-3 border border-outline-variant rounded-xl bg-white hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface">

                Google

<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">ios</span>

<p class="font-body-sm text-body-sm text-on-surface-variant">

</p>
